version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: library-db
    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: library-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: librarydb
      DB_USER: admin
      DB_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: library-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: